<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1320" height="960" viewBox="0 0 1320 960">

  <!-- Canvas background -->
  <rect width="1320" height="960" fill="#0f0f0f"/>

  <!-- Column labels -->
  <rect x="0"   y="0" width="660" height="52" fill="#1a1a1a"/>
  <rect x="660" y="0" width="660" height="52" fill="#1a1a1a"/>
  <text x="330" y="33" fill="#e0e0e0" font-size="14" font-weight="700"
        font-family="sans-serif" text-anchor="middle">BEFORE</text>
  <text x="990" y="33" fill="#d4891a" font-size="14" font-weight="700"
        font-family="sans-serif" text-anchor="middle">AFTER — Brand System v1</text>

  <!-- Sub-labels -->
  <text x="330" y="47" fill="#888" font-size="10" font-family="sans-serif" text-anchor="middle">Before — pre-brand system</text>
  <text x="990" y="47" fill="#a09282" font-size="10" font-family="sans-serif" text-anchor="middle">After — brand-aligned (Walk Talk Thai Brand System v1)</text>

  <!-- Divider -->
  <line x1="660" y1="0" x2="660" y2="960" stroke="#333" stroke-width="1"/>

  <!-- Left side -->
  <g transform="translate(10, 56)">
    <image href="data:image/svg+xml;base64,"
           width="640" height="900"/>
  </g>

  <!-- Right side -->
  <g transform="translate(670, 56)">
    <image href="data:image/svg+xml;base64,"
           width="640" height="900"/>
  </g>

  <!-- Token comparison strip -->
  <rect x="0" y="900" width="1320" height="60" fill="#1a1a1a"/>
  <text x="20" y="922" fill="#888" font-size="11" font-weight="700" font-family="sans-serif">KEY TOKEN CHANGES</text>

  <!-- Before tokens -->
  <rect x="20" y="938" width="14" height="14" fill="#126a6a" rx="3"/>
     <text x="38" y="949" fill="#666" font-size="10" font-family="sans-serif">accent #126a6a</text>
  <rect x="140" y="938" width="14" height="14" fill="#c8923a" rx="3"/>
     <text x="158" y="949" fill="#666" font-size="10" font-family="sans-serif">accent-2 #c8923a</text>
  <rect x="280" y="938" width="14" height="14" fill="#f7f1e3" rx="3"/>
     <text x="298" y="949" fill="#666" font-size="10" font-family="sans-serif">bg #f7f1e3</text>
  <rect x="380" y="938" width="14" height="14" fill="#1f1b15" rx="3"/>
     <text x="398" y="949" fill="#666" font-size="10" font-family="sans-serif">ink #1f1b15</text>

  <!-- Arrow -->
  <text x="650" y="949" fill="#d4891a" font-size="18" font-family="sans-serif" text-anchor="middle">→</text>

  <!-- After tokens -->
  <rect x="672" y="938" width="14" height="14" fill="#d4891a" rx="3"/>
     <text x="690" y="949" fill="#aaa" font-size="10" font-family="sans-serif">accent #d4891a (saffron)</text>
  <rect x="840" y="938" width="14" height="14" fill="#2a8873" rx="3"/>
     <text x="858" y="949" fill="#aaa" font-size="10" font-family="sans-serif">accent-2 #2a8873 (teal)</text>
  <rect x="1020" y="938" width="14" height="14" fill="#fdf8f2" rx="3"/>
     <text x="1038" y="949" fill="#aaa" font-size="10" font-family="sans-serif">bg #fdf8f2 (cream)</text>
  <rect x="1130" y="938" width="14" height="14" fill="#18120e" rx="3"/>
     <text x="1148" y="949" fill="#aaa" font-size="10" font-family="sans-serif">ink #18120e</text>
  <rect x="1220" y="938" width="14" height="14" fill="#a09282" rx="3"/>
     <text x="1238" y="949" fill="#aaa" font-size="10" font-family="sans-serif">muted #a09282</text>
</svg>